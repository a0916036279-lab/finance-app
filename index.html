// ── Firebase ──────────────────────────────────────────────────────────────────
let _db=null,_unsub=null,_fbActive=false,_fbApp=null;
function fbConnect(cfg,code,onData,onStatus){
  try{
    onStatus("connecting");
    if(_unsub){_unsub();_unsub=null;}
    if(_fbApp){try{_fbApp.delete();}catch{}}
    _fbApp=firebase.initializeApp(cfg,"fm"+(Date.now()%1e7));
    _db=firebase.firestore(_fbApp);
    _unsub=_db.doc(`vaults/${code}`).onSnapshot(
      d=>{if(d.exists)onData(d.data());onStatus("ok");_fbActive=true;},
      e=>{console.error(e);onStatus("err");}
    );
  }catch(e){console.error(e);onStatus("err");}
}
function fbSave(code,data){
  if(!_db||!code)return;
  _db.doc(`vaults/${code}`).set(data).catch(e=>console.error(e));
}

// ── 股票計算 ──────────────────────────────────────────────────────────────────
function calcStocks(stocks){
  const map={};
  stocks.forEach(tx=>{if(!map[tx.symbol])map[tx.symbol]=[];map[tx.symbol].push(tx);});
  const pos={},real={};
  Object.entries(map).forEach(([sym,txs])=>{
    const sorted=[...txs].sort((a,b)=>a.date.localeCompare(b.date));
    let sh=0,tc=0,tr=0;
    const name=sorted[sorted.length-1].name||sym;
    sorted.forEach(tx=>{
      if(tx.action==="買入"){tc+=buyT(tx.price,tx.shares);sh+=tx.shares;}
      else{const ac=sh>0?tc/sh:0;tr+=sellN(tx.price,tx.shares)-ac*tx.shares;tc-=ac*tx.shares;sh=Math.max(0,sh-tx.shares);if(sh===0)tc=0;}
    });
    real[sym]={symbol:sym,name,totalRealized:tr};
    if(sh>0)pos[sym]={symbol:sym,name,shares:sh,avgCost:sh>0?tc/sh:0};
  });
  return{pos,real};
}
function calcSellPnL(tx,all){
  const prev=[...all].filter(t=>t.symbol===tx.symbol&&(t.date<tx.date||(t.date===tx.date&&t.id!==tx.id))).sort((a,b)=>a.date.localeCompare(b.date));
  let sh=0,tc=0;
  prev.forEach(t=>{if(t.action==="買入"){tc+=buyT(t.price,t.shares);sh+=t.shares;}else{const ac=sh>0?tc/sh:0;tc-=ac*t.shares;sh=Math.max(0,sh-t.shares);}});
  return sh>0?sellN(tx.price,tx.shares)-(tc/sh)*tx.shares:null;
}
function acctBal(id,txs){return txs.filter(t=>t.accountId===id).reduce((s,t)=>s+(t.type==="提款"?-t.amount:t.amount),0);}

async function lookupStock(sym){
  try{const q=sym.match(/^\d/)?`${sym}.TW`:sym;const r=await fetch(`https://query1.finance.yahoo.com/v1/finance/search?q=${q}&lang=zh-TW&region=TW&quotesCount=1&newsCount=0`,{headers:{Accept:"application/json"}});if(!r.ok)return null;const d=await r.json();return d?.quotes?.[0]?.longname||d?.quotes?.[0]?.shortname||null;}catch{return null;}
}
async function fetchCryptoPx(ids){
  try{const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(",")}&vs_currencies=usd`);if(!r.ok)return{};return await r.json();}catch{return{};}
}

function FeeBox({action,price,shares,avgCost}){
  if(!price||!shares||+price<=0||+shares<=0)return null;
  const p=+price,s=+shares;
  const fee=cFee(p,s),tax=action==="賣出"?cTax(p,s):0;
  const pnl=action==="賣出"&&avgCost>0?sellN(p,s)-avgCost*s:null;
  return React.createElement("div",{style:{background:"#0f0f22",border:"1px solid #2e2e44",borderRadius:10,padding:"0.7rem 1rem",marginBottom:"0.85rem",fontSize:"0.77rem"}},

      React.createElement("span",{style:{textAlign:"right",fontWeight:700,color:"#c9a84c"}},fc(action==="買入"?p*s+fee:p*s-fee-tax)),
      pnl!==null&&React.createElement("div",{style:{gridColumn:"1/-1",borderTop:"1px solid #2e2e44",margin:"0.18rem 0"}}),
      pnl!==null&&React.createElement("span",{style:{fontWeight:700}},"預估損益（含費）"),
      pnl!==null&&React.createElement("span",{style:{textAlign:"right",fontWeight:800,color:pnl>=0?"#4caf8c":"#e05a5a"}},(pnl>=0?"+":"")+fc(pnl))
